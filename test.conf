# ==========================================
# Fichier de configuration de test WebServ
# ==========================================

server {
    # Premier serveur principal
    listen 8085 ;
    server_name localhost ;
    error_page 404 /errors/404.html ;
    client_max_body_size 1000000 ;

    # Route par defaut
    location / {
        root ./www ;
        index index.html ;
        autoindex off ;
        allow_methods GET POST DELETE;
    }

    location /me {
        root ./scripts;
        index me.py;
        allow_methods GET;
    }

    location /cgi-bin {
        root ./cgi-bin ;
        allow_methods GET POST ;
    }

    location /upload_file_script {
        root ./scripts;
        index upload_file.py;
        allow_methods POST;
    }

    # Route pour les fichiers statiques
    location /assets {
        root ./www ;
        autoindex on ;
        allow_methods GET ;
    }
}
