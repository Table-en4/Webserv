<!DOCTYPE html>
<html>
<head>
	<meta charset='utf-8'>
	<meta http-equiv='X-UA-Compatible' content='IE=edge'>
	<title>JS > PHP</title>
	<style>
		body {
			background-color: #333745;
		}
	</style>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<link rel='stylesheet' type='text/css' media='screen' href='main.css'>
	<script src='main.js'></script>
</head>
<body>
	<div class="IndexPage">
		<center>
    		<h1>Forms Page</h1>
		</center>
	</div>

	<div>
		<center>
			<form method="post" action="/cgi-bin/forms.py">

				<div class="input-group">
					<input type="text" name="first_name" required placeholder=" " />
					<label>First name</label>
				</div>

				<div class="input-group">
					<input type="text" name="last_name" required placeholder=" " />
					<label>Last name</label>
				</div>

				<div class="input-group">
					<input type="text" name="username" required placeholder=" " />
					<label>Username</label>
				</div>

				<button type="submit">Login</button>
				
			</form>
		</center>
	</div>

	<div class="Credit">
		<h6>
			<center>
				Webserv of Hguiller and Molapoug
			</center>
		</h6>
	</div>
	<script>
		document.querySelector(".Credit > h6").addEventListener("click", (ev) => {
			ev.target.style.width = "200px";
			var increment = 10;
			setInterval(() => {
				ev.target.style.width = (parseInt(ev.target.style.width, 10) + increment) + "px";
			}, 50);
		})
	</script>
</body>
</html>
